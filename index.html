<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Irrigation</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#eef3f7;
}

.header {
    background:#2f5d8a;
    color:white;
    padding:14px;
    text-align:center;
    font-weight:bold;
}

.container {
    padding:10px;
    padding-bottom:80px;
}

.card {
    background:white;
    padding:14px;
    margin-bottom:12px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card h3 {
    margin-bottom:10px;
    color:#2f5d8a;
}

/* ✅ STATUS BADGES */
.badge {
    padding:4px 8px;
    border-radius:5px;
    font-weight:bold;
    color:white;
}

.green { background:#4CAF50; }
.red { background:#e53935; }
.yellow { background:#ff9800; }

button {
    width:100%;
    padding:10px;
    margin-top:8px;
    border:none;
    border-radius:6px;
    font-weight:bold;
}

.primary { background:#4CAF50; color:white; }
.danger { background:#e53935; color:white; }
.secondary { background:#607d8b; color:white; }

input, select {
    width:100%;
    padding:8px;
    margin-top:5px;
    border-radius:6px;
    border:1px solid #ccc;
}

.nav {
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    background:#2f5d8a;
}

.nav div {
    flex:1;
    text-align:center;
    padding:12px;
    color:white;
}
</style>
</head>

<body>

<div class="header">Smart Irrigation System</div>

<div class="container">

<!-- HOME -->
<div id="homePage">

<div class="card">
<h3>Status</h3>
<p id="powerStatus"></p>
<p id="line"></p>
<p id="runtime"></p>
<p id="selectedMotorName"></p>
</div>

<div class="card">
<h3>Select Motor</h3>
<select id="motorSelect"></select>
<button class="secondary" onclick="selectMotor()">Select Motor</button>
</div>

<div class="card">
<button id="startBtn" class="primary" onclick="startMotor()">Start Motor</button>
<button id="stopBtn" class="danger" onclick="stopMotor()" style="display:none;">Stop Motor</button>
</div>

<!-- AUTO -->
<div class="card" id="autoSection">
<h3>Auto Irrigation</h3>

<button id="autoBtn" class="secondary" onclick="showAutoOptions()">
Enable Auto Setup
</button>

<div id="autoOptions" style="display:none;">
<label>Motor</label>
<select id="autoMotor"></select>

<label>Pipe</label>
<select id="autoPipe"></select>

<label>Time (seconds)</label>
<input id="autoTime" type="number">

<button class="primary" onclick="setAuto()">Start Auto</button>
</div>
</div>

<!-- FLOW + PIPE + TIMER -->
<div class="card">
<h3>Live Status</h3>

<p id="flow"></p>

<p id="soil"></p> <!-- ✅ ADDED -->

<p id="activePipe"></p> <!-- ✅ ADDED -->

<p id="timer"></p> <!-- ✅ ADDED -->

</div>

<!-- NOTIFICATIONS -->
<div class="card">
<h3>Notifications</h3>
<div id="notifications"></div>
</div>

<!-- ALERTS -->
<div class="card">
<h3>Alerts</h3>
<div id="alerts"></div>
</div>

</div>

<!-- PIPES -->
<div id="pipePage" style="display:none;">
<div class="card">
<h3>Add Pipe</h3>
<input id="newPipeName" placeholder="Pipe Name">
<button class="primary" onclick="addPipe()">Add Pipe</button>
</div>

<div class="card">
<h3>Pipe List</h3>
<div id="pipeList"></div>
</div>
</div>

<!-- MOTORS -->
<div id="motorPage" style="display:none;">
<div class="card">
<h3>Add Motor</h3>
<input id="motorName" placeholder="Motor Name">

<select id="motorLine">
<option>Line 1</option>
<option>Line 2</option>
<option>Line 3</option>
</select>

<div id="pipeCheckboxes"></div>

<button class="primary" onclick="addMotor()">Add Motor</button>
</div>

<div class="card">
<h3>Motor List</h3>
<div id="motorList"></div>
</div>
</div>

<!-- ANALYTICS -->
<div id="analyticsPage" style="display:none;">
<div class="card">
<h3>Analytics</h3>
<p id="totalRuntime"></p>
<p id="motorStarts"></p>
<p id="waterUsage"></p>
</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="showPage('home')">Home</div>
<div onclick="showPage('pipes')">Pipes</div>
<div onclick="showPage('motors')">Motors</div>
<div onclick="showPage('analytics')">Stats</div>
</div>

<script src="script.js"></script>

</body>
</html>
